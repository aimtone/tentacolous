site_name: Tentacolous
site_description: PostgreSQL database change listeners for Spring Boot
site_url: https://aimtone.github.io/tentacolous/
repo_url: https://github.com/aimtone/tentacolous
repo_name: aimtone/tentacolous
docs_dir: docs
site_dir: site
use_directory_urls: true

extra_css:
  - assets/extra.css

theme:
  name: material
  favicon: assets/favicon_32.png
  logo: assets/logoblanco.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          site_description: Listeners de cambios de PostgreSQL para Spring Boot
          nav:
            - Inicio: index.md
            - Primeros pasos:
                - Resumen: getting-started/overview.md
                - Requisitos: getting-started/requirements.md
                - Instalación: getting-started/installation.md
                - Migración desde 0.1.7: getting-started/migration.md
            - Conceptos:
                - Configuración: concepts/configuration.md
                - Mapeo de entidades: concepts/entity-mapping.md
                - Cómo funciona: concepts/how-it-works.md
                - Seguridad: concepts/security.md
                - Producción: concepts/production.md
            - API:
                - Listeners: api/listeners.md
                - Anotaciones: api/annotations.md
                - Filtros declarativos: api/declarative-filters.md
                - Filtros personalizados: api/custom-filters.md
                - Combinaciones inválidas: api/invalid-combinations.md
            - Ejemplos:
                - Pruebas manuales: examples/manual-testing.md
                - Tests: examples/tests.md
            - Archivo de versiones:
                - Versión actual: documentation/index.md
                - 0.1.8: documentation/0.1.8/index.md
                - 0.1.7: documentation/0.1.7/index.md
                - 0.1.6: documentation/0.1.6/index.md
  - search:
      lang:
        - en
        - es
  - offline

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started/overview.md
      - Requirements: getting-started/requirements.md
      - Installation: getting-started/installation.md
      - Migration from 0.1.7: getting-started/migration.md
  - Concepts:
      - Configuration: concepts/configuration.md
      - Entity mapping: concepts/entity-mapping.md
      - How it works: concepts/how-it-works.md
      - Security: concepts/security.md
      - Production: concepts/production.md
  - API:
      - Listeners: api/listeners.md
      - Annotations: api/annotations.md
      - Declarative filters: api/declarative-filters.md
      - Custom filters: api/custom-filters.md
      - Invalid combinations: api/invalid-combinations.md
  - Examples:
      - Manual testing: examples/manual-testing.md
      - Tests: examples/tests.md
  - Version archive:
      - Current alias: documentation/index.md
      - 0.1.8: documentation/0.1.8/index.md
      - 0.1.7: documentation/0.1.7/index.md
      - 0.1.6: documentation/0.1.6/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aimtone/tentacolous

copyright: Copyright &copy; Aimtone
